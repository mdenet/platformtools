name: test-reports
on:
  workflow_run:
    workflows: [ run-unit-tests ]
    types: 
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report: 
    runs-on: ubuntu-latest
    steps:
      - name: Create lint report - Xtext Editor Server
        id: build-xtext-es
        if: success() || failure()
        uses: dorny/test-reporter@v3
        with:
            name: Lint Results - Xtext Editor Server
            artifact: lint-results-editor-server
            path: "**/*.xml"
            reporter: java-junit
            fail-on-error: true

      - name: Create test report
        uses: dorny/test-reporter@v3
        if: success() || failure() 
        with:
            name: Unit Test Results
            artifact: test-results-editor-server
            path: '**/*.xml'
            reporter: java-junit
            fail-on-error: true

      - name: Download Coverage Files 
        uses: actions/download-artifact@v8
        if: success() || failure() 
        with:
            name: coverage-results-editor-server
            path: "reports/editor-server/"
            run-id: ${{ github.event.workflow_run.id }}
            github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Output coverage to summary
        if: success() || failure() 
        run: cat ./reports/editor-server/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
